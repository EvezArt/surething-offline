name: SureThing Offline CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install fastapi uvicorn pydantic python-dotenv httpx chromadb apscheduler sqlalchemy imapclient icalendar recurring-ical-events typer rich requests httpx[http2] pytest httpx
      - run: pip install ollama || true
      - run: python -m pytest tests/ -v --tb=short
